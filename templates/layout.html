<!DOCTYPE html>
<html>
<head>
    <title>Enterprise AI Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Clerk -->
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_cHJlc2VudC1nZWxkaW5nLTUwLmNsZXJrLmFjY291bnRzLmRldiQ"
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #0f172a;
            color: white;
            position: fixed;
            width: 250px;
            padding: 30px 20px;
            display: none;
            box-shadow: 4px 0px 20px rgba(0,0,0,0.05);
        }

        .sidebar h4 {
            font-weight: 700;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
            padding-left: 18px;
        }

        /* Main */
        .main-content {
            margin-left: 250px;
            padding: 40px;
        }

        /* Top Navbar */
        .navbar-custom {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
        }

        h2, h4, h5 {
            font-weight: 600;
        }

        /* Responsive */
        @media(max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h4>🚀 Enterprise AI</h4>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/train_model">🧠 Train Model</a>
    <a href="/ai_prediction">📊 AI Prediction</a>

    <hr class="text-secondary">

    <a href="#" id="logoutBtn" class="text-danger">🚪 Logout</a>
</div>

<div class="main-content">

    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">Enterprise AI Dashboard</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted small">Logged in as <strong id="userName"></strong></span>
            <div id="user-button"></div>
        </div>
    </div>

    {% block content %}{% endblock %}

</div>

<script>
window.addEventListener("load", async function () {
    await Clerk.load();

    if (Clerk.user) {
        document.getElementById("sidebar").style.display = "block";
        document.getElementById("userName").innerText =
            Clerk.user.firstName ||
            Clerk.user.primaryEmailAddress.emailAddress;

        Clerk.mountUserButton(document.getElementById("user-button"));

        document.getElementById("logoutBtn").addEventListener("click", function () {
            Clerk.signOut();
        });

    } else {
        if (window.location.pathname !== "/login") {
            window.location.href = "/login";
        }
    }
});
</script>

</body>
</html>
