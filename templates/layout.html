<!DOCTYPE html>
<html>
<head>
    <title>Enterprise AI Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #0f172a;
            color: white;
            position: fixed;
            width: 250px;
            padding: 30px 20px;
            box-shadow: 4px 0px 20px rgba(0,0,0,0.05);
        }

        .sidebar h4 {
            font-weight: 700;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
            padding-left: 18px;
        }

        /* Main */
        .main-content {
            margin-left: 250px;
            padding: 40px;
        }

        /* Top Navbar */
        .navbar-custom {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
        }

        h2, h4, h5 {
            font-weight: 600;
        }

        /* Responsive */
        @media(max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

{% if session.get('user') %}
<!-- Sidebar -->
<div class="sidebar">
    <h4>🚀 Enterprise AI</h4>

    <a href="{{ url_for('dashboard') }}">🏠 Dashboard</a>
    <a href="{{ url_for('train_model') }}">🧠 Train Model</a>
    <a href="{{ url_for('ai_prediction') }}">📊 AI Prediction</a>

    <hr class="text-secondary">

    <a href="{{ url_for('logout') }}" class="text-danger">🚪 Logout</a>
</div>
{% endif %}

<div class="main-content">

    {% if session.get('user') %}
    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">Enterprise AI Dashboard</h5>
        </div>
        <div>
            <span class="text-muted small">
                Logged in as <strong>{{ session['user'] }}</strong>
            </span>
        </div>
    </div>
    {% endif %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
