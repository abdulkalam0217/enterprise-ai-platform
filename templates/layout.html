<!DOCTYPE html>
<html>
<head>
    <title>Enterprise AI Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 240px;
            padding-top: 20px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        .main-content {
            margin-left: 240px;
            padding: 40px;
        }

        .navbar-custom {
            background: white;
            padding: 15px 30px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

{% if session.get("user") %}
<div class="sidebar">
    <h4 class="text-center mb-4">Enterprise AI</h4>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="{{ url_for('ai_prediction') }}">AI Prediction</a>
    <a href="{{ url_for('train_model') }}">AI Trainer</a>
    {% if session.get("role") == "admin" %}
        <a href="/dashboard">👥 Manage Users</a>
    {% endif %}

    <a href="/logout" class="text-danger">🚪 Logout</a>
</div>
{% endif %}

<div class="main-content">

    {% if session.get("user") %}
    <div class="navbar-custom mb-4">
        Welcome, <strong>{{ session.get("user") }}</strong>
    </div>
    {% endif %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
