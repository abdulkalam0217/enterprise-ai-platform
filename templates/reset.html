{% extends "layout.html" %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">
    <div class="card p-4 shadow">
        <h3>Reset Password</h3>

        <form method="POST">
            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Enter new password"
                   required>

            <button class="btn btn-success w-100">
                Update Password
            </button>
        </form>
    </div>
</div>

{% endblock %}
