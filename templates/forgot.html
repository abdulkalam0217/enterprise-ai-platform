{% extends "layout.html" %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">
    <div class="card p-4 shadow">
        <h3>Forgot Password</h3>

        <form method="POST">
            <input type="email"
                   name="email"
                   class="form-control mb-3"
                   placeholder="Enter your email"
                   required>

            <button class="btn btn-danger w-100">
                Send Reset Link
            </button>
        </form>
    </div>
</div>

{% endblock %}
