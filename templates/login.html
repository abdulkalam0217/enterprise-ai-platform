{% extends "layout.html" %}

{% block content %}

<style>
    .auth-wrapper {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 16px;
        background: white;
        box-shadow: 0px 20px 40px rgba(0,0,0,0.08);
    }

    .auth-title {
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #e2e8f0;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #6366f1;
    }

    .btn-auth {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0px 10px 20px rgba(99,102,241,0.3);
    }

    .auth-links {
        margin-top: 20px;
        text-align: center;
    }

    .auth-links a {
        text-decoration: none;
        color: #6366f1;
        font-weight: 500;
    }

    body {
        background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">

        <h3 class="auth-title">Login to Enterprise AI</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-auth w-100 text-white">
                Login
            </button>

        </form>

        <div class="auth-links">
            <p class="mt-3 mb-1">
                <a href="{{ url_for('register') }}">Create an account</a>
            </p>
            <p>
                <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
            </p>
        </div>

    </div>
</div>

{% endblock %}
